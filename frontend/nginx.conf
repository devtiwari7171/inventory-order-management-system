server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed Vite assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any unknown path returns index.html so React Router handles it
  location / {
    try_files $uri /index.html;
  }

  # Optional: forward API calls from same-origin to backend.
  # (Set VITE_API_URL to '' and rely on this proxy OR set VITE_API_URL to your deployed URL.)
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
