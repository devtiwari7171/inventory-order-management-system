# Render Blueprint — automatic deployment from GitHub.
# This file tells Render how to deploy the backend.
services:
  - type: web
    name: inventory-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "False"
